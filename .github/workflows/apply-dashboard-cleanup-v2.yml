name: Apply corrected autonomous dashboard cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.head_ref == 'cleanup/autonomy-dashboard' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/autonomy-dashboard
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct and apply dashboard cleanup
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-dashboard-cleanup.py')
          lines = path.read_text().splitlines()
          path.write_text('\n'.join(line for line in lines if "src/drone-adapters.test.ts" not in line) + '\n')
          PY
          python3 scripts/apply-dashboard-cleanup.py
          rm -f dashboard-cleanup-error.txt
          rm -f .github/workflows/diagnose-dashboard-cleanup.yml
          rm -f .github/workflows/apply-dashboard-cleanup-v2.yml
      - run: npm install
      - run: npm run typecheck
      - run: npm run check:client
      - run: npm test
      - run: npm run build
      - run: node scripts/autonomy-smoke.mjs
      - name: Commit verified cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Simplify autonomous dashboard and harden GPS quality"
          git push origin HEAD:cleanup/autonomy-dashboard
