name: Repair autonomy smoke assertion

on:
  push:
    branches: [fix/autonomy-physical-telemetry]

permissions:
  contents: write

jobs:
  repair-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/autonomy-physical-telemetry
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Make immediate AprilTag acquisition valid
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/autonomy-smoke.mjs')
          text = path.read_text()
          old = "for (const expected of ['navigating', 'searching-landing-pad', 'aligning-landing-pad', 'landing']) {"
          new = "for (const expected of ['navigating', 'aligning-landing-pad', 'landing']) {"
          if old not in text:
              raise SystemExit('Expected smoke assertion was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npm install
      - run: npm run typecheck
      - run: npm run check:client
      - run: npm test
      - run: npm run build
      - run: node scripts/autonomy-smoke.mjs
      - name: Commit verified smoke repair
        run: |
          rm .github/workflows/apply-autonomy-smoke-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/autonomy-smoke.mjs .github/workflows/apply-autonomy-smoke-fix.yml
          git commit -m "Allow immediate landing-pad acquisition in autonomy smoke"
          git push origin HEAD:fix/autonomy-physical-telemetry
