name: Apply corrected autonomy hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/autonomy-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct, extract, and apply hardening patch
        run: |
          sed -i "s/it('stops when metric range is stale'/it('blocks movement when required range data is stale'/" \
            .github/workflows/apply-autonomy-hardening.yml
          awk '/python3 - <<'\''PY'\''/{capture=1;next} /^          PY$/{capture=0} capture' \
            .github/workflows/apply-autonomy-hardening.yml \
            | sed 's/^          //' > /tmp/apply-autonomy-hardening.py
          python3 /tmp/apply-autonomy-hardening.py
      - run: npm install
      - run: npm run typecheck
      - run: npm run check:client
      - run: npm test
      - run: npm run build
      - run: node scripts/autonomy-smoke.mjs
      - name: Commit verified hardening
        run: |
          rm -f .github/workflows/apply-autonomy-hardening.yml
          rm -f .github/workflows/apply-autonomy-hardening-pr.yml
          rm -f .github/workflows/apply-autonomy-hardening-fixed.yml
          rm -f .github/workflows/diagnose-autonomy-hardening.yml
          rm -rf diagnostics
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden autonomous flight fail-safes"
          git pull --rebase origin fix/autonomy-hardening
          git push origin HEAD:fix/autonomy-hardening
