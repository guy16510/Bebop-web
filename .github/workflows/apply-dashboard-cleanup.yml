name: Apply autonomous dashboard cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.head_ref == 'cleanup/autonomy-dashboard' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/autonomy-dashboard
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply dashboard cleanup and GPS gates
        run: python3 scripts/apply-dashboard-cleanup.py
      - run: npm install
      - run: npm run typecheck
      - run: npm run check:client
      - run: npm test
      - run: npm run build
      - run: node scripts/autonomy-smoke.mjs
      - name: Commit verified cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Simplify autonomous dashboard and harden GPS quality"
          git push origin HEAD:cleanup/autonomy-dashboard
