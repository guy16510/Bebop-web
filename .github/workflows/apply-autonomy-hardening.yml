name: Apply autonomy safety hardening

on:
  push:
    branches: [fix/autonomy-hardening]

permissions:
  contents: write

jobs:
  harden-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/autonomy-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply autonomy hardening
