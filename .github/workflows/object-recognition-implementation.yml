name: Implement object recognition

on:
  push:
    branches: [feature/object-recognition]
    paths:
      - .github/recognition-ready
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: object-recognition-implementation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEAD_BRANCH: ${{ github.head_ref || 'feature/object-recognition' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'feature/object-recognition' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply integration patch
        run: |
          if grep -q "RecognitionVisionManager" src/server.ts; then
            echo "Object recognition integration is already applied"
          else
            python3 scripts/apply-object-recognition.py
          fi

      - name: Validate Python sources
        run: python3 -m py_compile perception-sidecar/scripts/recognition_stream.py scripts/apply-object-recognition.py

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Check browser JavaScript
        run: npm run check:client

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Keep CI workflow unchanged
        run: git checkout -- .github/workflows/ci.yml

      - name: Commit validated implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          if git diff --cached --quiet; then
            echo "No integration changes to commit"
            exit 0
          fi
          git commit -m "Implement named object tracking and recognition" -m "Closes #19"
          git push origin "HEAD:${HEAD_BRANCH}"
