name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 2
      - name: Fail on typecheck errors
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1
      - run: npm run check:client
      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: npm test > unit-tests.log 2>&1
      - name: Upload unit-test diagnostics
        if: steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          retention-days: 2
      - name: Fail on unit-test errors
        if: steps.unit_tests.outcome == 'failure'
        run: |
          cat unit-tests.log
          exit 1
      - run: npm run build
      - name: Run autonomy smoke
        id: autonomy_smoke
        continue-on-error: true
        run: node scripts/autonomy-smoke.mjs > autonomy-smoke.log 2>&1
      - name: Upload autonomy-smoke diagnostics
        if: steps.autonomy_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-smoke-diagnostics
          path: autonomy-smoke.log
          retention-days: 2
      - name: Fail on autonomy-smoke errors
        if: steps.autonomy_smoke.outcome == 'failure'
        run: |
          cat autonomy-smoke.log
          exit 1
      - run: node scripts/perception-smoke.mjs
      - run: node scripts/perception-server-smoke.mjs
      - name: Validate calibration and AprilTag script syntax
        run: python3 -m py_compile scripts/calibrate-bebop-camera.py perception-sidecar/scripts/apriltag_stream.py

  perception-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build pinned ORB-SLAM3 and YOLOX sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: perception-sidecar/Dockerfile
          load: true
          tags: bebop-perception-sidecar:ci
          cache-from: type=gha,scope=bebop-perception-sidecar
          cache-to: type=gha,mode=max,scope=bebop-perception-sidecar
      - name: Execute engines, AprilTag detector, and production Bebop replay path
        run: |
          mkdir -p /tmp/perception-replay
          docker run --rm bebop-perception-sidecar:ci --self-test > /tmp/sidecar-self-test.json
          docker run --rm \
            --entrypoint python3 \
            bebop-perception-sidecar:ci \
            /work/perception-sidecar/scripts/apriltag_stream.py --self-test \
            > /tmp/apriltag-self-test.json
          docker run --rm \
            --entrypoint /usr/local/bin/bebop-perception-engine-self-test \
            -e ORB_SETTINGS=/config/bebop2-upstream-428x240.yaml \
            -e SYNTHETIC_VIDEO_OUT=/replay/synthetic.avi \
            -v /tmp/perception-replay:/replay \
            bebop-perception-sidecar:ci > /tmp/engine-self-test.json
          cat > /tmp/perception-replay/start.ndjson <<'EOF'
          {"type":"start","protocolVersion":1,"videoUrl":"/replay/synthetic.avi","stateUrl":"","slam":{"library":"ORB-SLAM3","sensorMode":"monocular","cameraModel":"pinhole","requireCalibration":true},"detector":{"runtime":"OpenCV DNN","modelFamily":"YOLOX"}}
          EOF
          docker run --rm -i \
            --entrypoint /usr/local/bin/bebop-perception-sidecar \
            -e ORB_SETTINGS=/config/bebop2-upstream-428x240.yaml \
            -e PERCEPTION_CAMERA_CALIBRATED=true \
            -e PERCEPTION_OUTPUT_HZ=30 \
            -e DETECTION_EVERY_N_FRAMES=10 \
            -v /tmp/perception-replay:/replay:ro \
            bebop-perception-sidecar:ci \
            < /tmp/perception-replay/start.ndjson \
            > /tmp/production-replay.ndjson
          python3 - <<'PY'
          import json
          from pathlib import Path

          protocol = json.loads(Path('/tmp/sidecar-self-test.json').read_text())
          assert protocol['type'] == 'perception.snapshot'
          snapshot = protocol['snapshot']
          assert snapshot['backend'] == 'external'
          assert snapshot['source'] == 'orb-slam3-yolox-self-test'
          assert snapshot['trackingState'] == 'tracking'
          assert snapshot['calibrated'] is True
          assert snapshot['map']['bounds']['minX'] < snapshot['map']['bounds']['maxX']

          april = json.loads(Path('/tmp/apriltag-self-test.json').read_text())
          assert april['ok'] is True
          assert april['detections'][0]['id'] == 'apriltag-7'

          engines = json.loads(Path('/tmp/engine-self-test.json').read_text())
          assert engines['ok'] is True
          assert engines['camera']['model'] == 'PinHole'
          assert engines['camera']['width'] == 428
          assert engines['camera']['height'] == 240
          assert engines['orbSlam3']['vocabularyLoaded'] is True
          assert engines['orbSlam3']['systemConstructed'] is True
          assert engines['orbSlam3']['framesSubmitted'] == 120
          assert engines['orbSlam3']['trackingReached'] is True
          assert engines['orbSlam3']['maxTrackedPoints'] > 0
          assert engines['orbSlam3']['maxTrackedFeatures'] >= 40
          assert engines['orbSlam3']['syntheticVideoWritten'] is True
          assert Path('/tmp/perception-replay/synthetic.avi').stat().st_size > 0
          assert engines['yolox']['modelLoaded'] is True
          assert engines['yolox']['inferenceExecuted'] is True
          assert engines['yolox']['outputElements'] > 0

          replay = [
              json.loads(line)['snapshot']
              for line in Path('/tmp/production-replay.ndjson').read_text().splitlines()
              if line.strip()
          ]
          assert len(replay) >= 3
          assert all(item['backend'] == 'external' for item in replay)
          assert all(item['calibrated'] is True for item in replay)
          assert any(item['trackingState'] == 'tracking' for item in replay)
          assert max(len(item['trajectory']) for item in replay) >= 5
          assert max(len(item['map']['landmarks']) for item in replay) > 0
          assert max(item['metrics']['trackedFeatures'] for item in replay) >= 40
          assert any(item['metrics']['inferenceMs'] > 0 for item in replay)
          assert any('yolox' in item['source'] for item in replay)

          print(json.dumps({
              'ok': True,
              'camera': engines['camera'],
              'framesSubmitted': engines['orbSlam3']['framesSubmitted'],
              'maxTrackedPoints': max(len(item['map']['landmarks']) for item in replay),
              'maxTrajectory': max(len(item['trajectory']) for item in replay),
              'maxTrackedFeatures': max(item['metrics']['trackedFeatures'] for item in replay),
              'yoloxOutputElements': engines['yolox']['outputElements'],
              'aprilTag': april['detections'][0]['id'],
              'productionSnapshots': len(replay),
          }))
          PY
