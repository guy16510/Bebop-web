name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm run check:client
      - run: npm test
      - run: npm run build
      - run: node scripts/perception-smoke.mjs
      - run: node scripts/perception-server-smoke.mjs
      - name: Validate calibration script syntax
        run: python3 -m py_compile scripts/calibrate-bebop-camera.py

  perception-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build pinned ORB-SLAM3 and YOLOX sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: perception-sidecar/Dockerfile
          load: true
          tags: bebop-perception-sidecar:ci
          cache-from: type=gha,scope=bebop-perception-sidecar
          cache-to: type=gha,mode=max,scope=bebop-perception-sidecar
      - name: Execute sidecar protocol and perception engines
        run: |
          docker run --rm bebop-perception-sidecar:ci --self-test > /tmp/sidecar-self-test.json
          docker run --rm \
            --entrypoint /usr/local/bin/bebop-perception-engine-self-test \
            -e ORB_SETTINGS=/config/bebop2.example.yaml \
            bebop-perception-sidecar:ci > /tmp/engine-self-test.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          protocol = json.loads(Path('/tmp/sidecar-self-test.json').read_text())
          assert protocol['type'] == 'perception.snapshot'
          snapshot = protocol['snapshot']
          assert snapshot['backend'] == 'external'
          assert snapshot['source'] == 'orb-slam3-yolox-self-test'
          assert snapshot['trackingState'] == 'tracking'
          assert snapshot['calibrated'] is True
          assert snapshot['map']['bounds']['minX'] < snapshot['map']['bounds']['maxX']

          engines = json.loads(Path('/tmp/engine-self-test.json').read_text())
          assert engines['ok'] is True
          assert engines['orbSlam3']['vocabularyLoaded'] is True
          assert engines['orbSlam3']['systemConstructed'] is True
          assert engines['orbSlam3']['framesSubmitted'] == 18
          assert engines['yolox']['modelLoaded'] is True
          assert engines['yolox']['inferenceExecuted'] is True
          assert engines['yolox']['outputElements'] > 0
          print(json.dumps({
              'ok': True,
              'source': snapshot['source'],
              'framesSubmitted': engines['orbSlam3']['framesSubmitted'],
              'yoloxOutputElements': engines['yolox']['outputElements'],
          }))
          PY
