name: ARM64 perception validation

on:
  pull_request:
    paths:
      - 'perception-sidecar/**'
      - 'config/perception/**'
      - 'scripts/build-perception-sidecar.sh'
      - 'scripts/verify-perception-sidecar.sh'
      - '.github/workflows/perception-arm64.yml'
  push:
    branches: [main]
    paths:
      - 'perception-sidecar/**'
      - 'config/perception/**'
      - 'scripts/build-perception-sidecar.sh'
      - 'scripts/verify-perception-sidecar.sh'
      - '.github/workflows/perception-arm64.yml'
  workflow_dispatch:

concurrency:
  group: arm64-perception-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perception-arm64:
    # Native ARM64 validation matches the Linux architecture used by Docker Desktop on Apple Silicon.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Confirm native ARM64 runner
        run: test "$(uname -m)" = "aarch64"
      - name: Build sidecar natively for ARM64
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          docker build --progress=plain --file perception-sidecar/Dockerfile --tag bebop-perception-sidecar:arm64 . 2>&1 | tee arm64-build.log
      - name: Upload ARM64 build diagnostics
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: arm64-perception-build-log
          path: arm64-build.log
          retention-days: 3
      - name: Fail on ARM64 build errors
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 200 arm64-build.log
          exit 1
      - name: Run complete ARM64 engine and production replay verification
        env:
          PERCEPTION_IMAGE: bebop-perception-sidecar:arm64
        run: bash scripts/verify-perception-sidecar.sh
